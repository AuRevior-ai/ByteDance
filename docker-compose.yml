services:
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev
      POSTGRES_DB: agenthub
    ports:
      - "5432:5432"
    volumes:
      - agenthub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agenthub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - agenthub-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agenthub-postgres:
  agenthub-redis:

